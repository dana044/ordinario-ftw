<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - Cinema Eclipse</title>
    <link rel="stylesheet" href="carrito.css">
</head>
<body>
    <header>
        <h1>Cinema Eclipse</h1>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cartelera.html">Cartelera</a></li>
                <li><a href="dulceria.html">Dulcería</a></li>
                <li><a href="reseñas.html">Reseñas</a></li>
                <li><a href="carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Tu Carrito de Compras</h2>

        <div class="contenedor">
            <table class="tabla-carrito">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cant.</th>
                        <th>Precio</th>
                    </tr>
                </thead>
                <tbody id="cuerpoCarrito">
                    </tbody>
            </table>
            <h3 class="total-texto">Total: $<span id="totalCarrito">0.00</span> MXN</h3>
            <br>
            <div class="infoPago">
                <h3>Información de Pago</h3>
                <input type="text" id="nombreTarjeta" placeholder="Nombre en la Tarjeta" required>
                <input type="text" id="numTarjeta" placeholder="Número de Tarjeta (16 dígitos)" maxlength="16" required>
                <input type="text" id="expTarjeta" placeholder="MM/AA" maxlength="5" required>
                <input type="password" id="cvvTarjeta" placeholder="CVV" maxlength="3" required>
            </div>
            <button id="btnPagar" class="btn">Pagar Ahora</button>
        </div>
        
        <br>
        <a href="dulceria.html" class="btn">Volver a Dulcería</a>
    </main>

    <footer>
        <p>Cinema Eclipse. Proyecto de Fundamentos de Tecnologías Web</p>
    </footer>

    <script src="carrito.js"></script>
</body>
</html>
