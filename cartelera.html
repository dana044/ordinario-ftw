<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera - Cinema Eclipse</title>
    <link rel="stylesheet" href="cartelera.css">
</head>
<body>
    <header>
        <h1>Cinema Eclipse</h1>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cartelera.html">Cartelera</a></li>
                <li><a href="dulceria.html">Dulcería</a></li>
                <li><a href="promociones.html">Promociones</a></li>
                <li><a href="reseñas.html">Reseñas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Cartelera</h2>

        <div class="filtros-contenedor">
            <div>
                <label for="filtroGenero">Filtrar por género:</label>
                <select id="filtroGenero">
                    <option value="Todos">Todos</option>
                    <option value="Acción">Acción</option>
                    <option value="Terror">Terror</option>
                    <option value="Animación">Animación</option>
                    <option value="Comedia">Comedia</option>
                    <option value="Ciencia Ficción">Ciencia ficción</option>
                    <option value="Drama">Drama</option>
                    <option value="Romance">Romance</option>
                </select>
            </div>

            <div>
                <label for="filtroFecha">Filtrar por fecha:</label>
                <input type="date" id="filtroFecha">
            </div>
        </div>

        <div class="contenedor-cartelera" id="contenedorCartelera"></div>
    </main>

    <footer>
        <p>Cinema Eclipse. Proyecto de Fundamentos de Tecnologías Web</p>
    </footer>

    <script src="cartelera.js"></script>
