<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Boletos - Cinema Eclipse</title>
    <link rel="stylesheet" href="comprar-boletos.css">
</head>
<body>
    <header>
        <h1>Cinema Eclipse</h1>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cartelera.html">Cartelera</a></li>
                <li><a href="dulceria.html">Dulcería</a></li>
                <li><a href="reseñas.html">Reseñas</a></li>
                <li><a href="carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </header>

    <main class="comprar-main">
        <div class="mapa-asientos">
            <h2 id="tituloPelicula"></h2>
            <br>
            
            <div class="campo-manual">
                <label for="comboHorario">Selecciona Horario:</label>
                <select id="comboHorario" class="inputs-compra"></select>
            </div>
            
            <img src="img/mapa.jpg" alt="Mapa de asientos" class="imagen">
            
            <div class="campos">
                <label for="cantidadBoletos">Número de boletos:</label>
                <input type="number" id="cantidadBoletos" class="inputs-compra" min="1" max="32" value="1">
                <label for="asientosEscritos">Tus asientos (ej. 12, 13):</label>
                <input type="text" id="asientosEscritos" class="inputs-compra" placeholder="Ej: 15, 16">
            </div>
        </div>

        <div class="resumen-compra">
            <h3>Resumen</h3>
            <div class="dato-resumen">Boletos: <span id="numBoletos">1</span></div>
            <div class="dato-resumen">Asientos: <span id="listaAsientos">Ninguno</span></div>
            <div class="dato-resumen">Total: <span id="totalVenta">$75.00</span></div>
            
            <button id="btnAlCarrito" class="btn">Agregar al Carrito</button>
            <a href="cartelera.html" class="btn">Regresar</a>
        </div>
    </main>

    <footer>
        <p>Cinema Eclipse. Proyecto de Fundamentos de Tecnologías Web</p>
    </footer>

    <script src="comprar-boletos.js"></script>
</body>
</html>
